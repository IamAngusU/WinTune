# Include this inside the HTTPS server block for angusu.de.
# The source tree stays private: only the landing page, API front controller,
# and signed ZIP packages have public routes.
location = /wintune { return 301 /wintune/; }

location = /wintune/ {
    alias /var/www/html/AlleProjekte/wintune/index.php;
    include fastcgi_params;
    fastcgi_pass unix:/run/php/php8.1-fpm.sock;
    fastcgi_param SCRIPT_FILENAME /var/www/html/AlleProjekte/wintune/index.php;
    fastcgi_param SCRIPT_NAME /wintune/index.php;
}

location = /wintune/index.php {
    internal;
    include fastcgi_params;
    fastcgi_pass unix:/run/php/php8.1-fpm.sock;
    fastcgi_param SCRIPT_FILENAME /var/www/html/AlleProjekte/wintune/index.php;
    fastcgi_param SCRIPT_NAME /wintune/index.php;
}

location = /wintune/changelog/ {
    include fastcgi_params;
    fastcgi_pass unix:/run/php/php8.1-fpm.sock;
    fastcgi_param SCRIPT_FILENAME /var/www/html/AlleProjekte/wintune/changelog.php;
    fastcgi_param SCRIPT_NAME /wintune/changelog/;
}

location = /wintune/api/index.php {
    internal;
    include fastcgi_params;
    fastcgi_pass unix:/run/php/php8.1-fpm.sock;
    fastcgi_param SCRIPT_FILENAME /var/www/html/AlleProjekte/wintune/Server/public/index.php;
    fastcgi_param SCRIPT_NAME /wintune/api/index.php;
    fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
}

location ^~ /wintune/api/ {
    client_max_body_size 128k;
    limit_req zone=req_php_per_ip burst=10 nodelay;
    try_files "" /wintune/api/index.php?$query_string;
}

location ^~ /wintune/releases/ {
    alias /var/www/html/AlleProjekte/wintune/Server/storage/releases/packages/;
    autoindex off;
    types { application/zip zip; }
    add_header X-Content-Type-Options nosniff always;
    add_header Content-Disposition "attachment" always;
}

location ^~ /wintune/assets/ {
    alias /var/www/html/AlleProjekte/wintune/assets/;
    expires 7d;
    add_header Cache-Control "public";
    add_header X-Content-Type-Options nosniff always;
}

location ^~ /wintune/ { return 404; }
